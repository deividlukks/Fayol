services:
  # PostgreSQL Database com backup automático
  postgres:
    image: postgres:15-alpine
    container_name: fayol-postgres-prod
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
      - ./configs/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./configs/postgres/backup.sh:/backup.sh
    networks:
      - fayol-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: always

  # Redis Cache com persistência
  redis:
    image: redis:7-alpine
    container_name: fayol-redis-prod
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_prod_data:/data
    networks:
      - fayol-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: always

  # Backend NestJS
  backend:
    image: ${DOCKER_REGISTRY}/fayol-backend:${BACKEND_VERSION:-latest}
    container_name: fayol-backend-prod
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-24h}
      LOG_LEVEL: info
    expose:
      - "3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fayol-network
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Frontend Next.js
  web-app:
    image: ${DOCKER_REGISTRY}/fayol-web:${WEB_VERSION:-latest}
    container_name: fayol-web-prod
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://api.fayol.app
    expose:
      - "3000"
    depends_on:
      - backend
    networks:
      - fayol-network
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Telegram Bot
  telegram-bot:
    image: ${DOCKER_REGISTRY}/fayol-telegram-bot:${BOT_VERSION:-latest}
    container_name: fayol-telegram-bot-prod
    environment:
      NODE_ENV: production
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      API_URL: http://backend:3000
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    depends_on:
      - backend
      - redis
    networks:
      - fayol-network
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Python AI Service
  python-ai:
    image: ${DOCKER_REGISTRY}/fayol-python-ai:${AI_VERSION:-latest}
    container_name: fayol-python-ai-prod
    environment:
      ENVIRONMENT: production
      API_URL: http://backend:3000
    expose:
      - "8000"
    depends_on:
      - backend
    networks:
      - fayol-network
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: fayol-nginx-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./configs/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./configs/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - web-app
    networks:
      - fayol-network
    restart: always

networks:
  fayol-network:
    driver: bridge

volumes:
  postgres_prod_data:
  redis_prod_data:
