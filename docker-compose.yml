services:
  # --- INFRAESTRUTURA ---
  postgres:
    image: postgres:15-alpine
    container_name: fayol_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fayol_dev
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fayol_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fayol_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - fayol_network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    container_name: fayol_mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: fayol_logs
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - fayol_network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # --- SERVIÇOS DA APLICAÇÃO ---
  
  # Inteligência Artificial
  python-ai:
    build:
      # CORREÇÃO: Contexto aponta para a pasta da lib, isolando o build do Python
      context: ./libs/python-ai
      dockerfile: Dockerfile
    container_name: fayol_ai_service
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - fayol_network
    develop:
      watch:
        - action: sync
          path: ./libs/python-ai/src
          target: /app/src
          ignore:
            - __pycache__/
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # API Backend
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: fayol_backend
    ports:
      - "3333:3333"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/fayol_dev?schema=public
      - JWT_SECRET=fayol_secret_dev_key_123
      - JWT_EXPIRATION=1d
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - AI_SERVICE_URL=http://python-ai:8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      python-ai:
        condition: service_healthy
    networks:
      - fayol_network
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/backend/node_modules
    # CORREÇÃO: Aumentar intervalo e retries, e usar localhost correto
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3333/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Frontend Web App
  web-app:
    build:
      context: .
      dockerfile: apps/web-app/Dockerfile
    container_name: fayol_web
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      # URL da API acessível pelo navegador (cliente)
      - NEXT_PUBLIC_API_URL=http://localhost:3333/api
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - fayol_network
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/web-app/node_modules
      - /app/apps/web-app/.next

  # Telegram Bot
  telegram-bot:
    build:
      context: .
      dockerfile: apps/telegram-bot/Dockerfile
    container_name: fayol_telegram_bot
    environment:
      - NODE_ENV=development
      # Token deve estar no seu .env local
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      # Comunicação interna via Docker
      - API_BASE_URL=http://backend:3333/api
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - fayol_network
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/telegram-bot/node_modules

  # --- FERRAMENTAS ADICIONAIS ---
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: fayol_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@fayol.app
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    networks:
      - fayol_network
    depends_on:
      - postgres

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: fayol_redis_commander
    environment:
      - REDIS_HOSTS=default:redis:6379
    ports:
      - "8081:8081"
    networks:
      - fayol_network
    depends_on:
      - redis

volumes:
  postgres_data:
  redis_data:
  mongodb_data:

networks:
  fayol_network:
    driver: bridge