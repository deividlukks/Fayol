name: fayol-system

services:
  # --- INFRAESTRUTURA DE DADOS ---
  postgres:
    image: postgres:15-alpine
    container_name: fayol_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fayol_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: fayol_redis
    restart: always
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    networks:
      - fayol_net
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- SERVIÇOS DA APLICAÇÃO ---
  
  # Serviço de Inteligência Artificial (Python)
  python-ai:
    build:
      context: ./libs/python-ai
      dockerfile: Dockerfile
    container_name: fayol_ai
    restart: unless-stopped
    ports:
      - "${PORT_AI}:8000"
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - fayol_net
    volumes:
      - ./libs/python-ai/src:/app/src
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API Backend (NestJS)
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: fayol_backend
    restart: unless-stopped
    ports:
      - "${PORT_BACKEND}:3333"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      python-ai:
        condition: service_healthy
    networks:
      - fayol_net
    volumes:
      # Monta o código fonte do host para o container (Hot Reload)
      - .:/app
      # --- PROTEÇÃO DE DEPENDÊNCIAS (Crucial para Windows) ---
      # Isso impede que o node_modules do Windows sobrescreva o do Linux
      - /app/node_modules
      - /app/apps/backend/node_modules
      # Pacotes compartilhados (onde fica o Prisma Client)
      - /app/packages/database-models/node_modules
      - /app/packages/shared-types/node_modules
      - /app/packages/shared-utils/node_modules
      - /app/packages/shared-constants/node_modules
      - /app/packages/validation-schemas/node_modules
      - /app/packages/ai-services/node_modules
      - /app/packages/api-client/node_modules
      - /app/packages/ui-components/node_modules
      - /app/packages/integrations/node_modules
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3333/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Frontend (Next.js)
  web-app:
    build:
      context: .
      dockerfile: apps/web-app/Dockerfile
    container_name: fayol_web
    restart: unless-stopped
    ports:
      - "${PORT_WEB}:3000"
    env_file: .env
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - fayol_net
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/web-app/node_modules
      - /app/apps/web-app/.next
      # Proteção para os pacotes usados pelo frontend também
      - /app/packages/shared-types/node_modules
      - /app/packages/shared-utils/node_modules
      - /app/packages/ui-components/node_modules

  # Bot do Telegram
  telegram-bot:
    build:
      context: .
      dockerfile: apps/telegram-bot/Dockerfile
    container_name: fayol_bot
    restart: unless-stopped
    env_file: .env
    environment:
      - API_BASE_URL=http://backend:3333/api
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - fayol_net
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/telegram-bot/node_modules

  # --- FERRAMENTAS DE ADMINISTRAÇÃO ---
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: fayol_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@fayol.app
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    networks:
      - fayol_net
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:

networks:
  fayol_net:
    driver: bridge